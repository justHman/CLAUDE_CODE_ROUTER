<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Router Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 font-sans antialiased">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
                    Claude Code Router
                </h1>
                <p class="text-slate-400 mt-2 font-medium">Real-time API Analytics Dashboard</p>
            </div>
            <button onclick="fetchData()" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl transition-all shadow-lg flex items-center gap-2 active:scale-95">
                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span class="font-semibold text-slate-200">Refresh Data</span>
            </button>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-6 shadow-2xl relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-all"></div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Total Requests
                </h3>
                <p class="text-5xl font-black mt-3 text-slate-100 font-mono" id="kpi-calls">0</p>
            </div>
            <div class="glass-panel p-6 shadow-2xl relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl group-hover:bg-emerald-500/20 transition-all"></div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                    Tokens Usage
                </h3>
                <p class="text-5xl font-black mt-3 text-emerald-400 font-mono" id="kpi-tokens">0</p>
            </div>
            <div class="glass-panel p-6 shadow-2xl relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-all"></div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Avg Latency
                </h3>
                <p class="text-5xl font-black mt-3 text-purple-400 font-mono flex items-baseline gap-1">
                    <span id="kpi-latency">0</span>
                    <span class="text-xl text-slate-500 font-medium">ms</span>
                </p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="glass-panel p-6 shadow-2xl xl:col-span-2 flex flex-col h-[400px]">
                <h3 class="text-lg font-bold text-slate-200 mb-4">Requests by Target Model</h3>
                <div class="relative flex-1 w-full">
                    <canvas id="modelChart"></canvas>
                </div>
            </div>
            <div class="glass-panel p-6 shadow-2xl flex flex-col h-[400px]">
                <h3 class="text-lg font-bold text-slate-200 mb-4">Traffic by Provider</h3>
                <div class="relative flex-1 w-full">
                    <canvas id="providerChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Logs Table -->
        <div class="glass-panel p-6 shadow-2xl overflow-hidden">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-slate-200">Recent API Logs</h3>
                <span class="px-3 py-1 bg-blue-500/20 text-blue-400 text-xs font-bold rounded-full border border-blue-500/30">Live Updates</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="border-b-2 border-slate-700/50 text-xs font-bold text-slate-400 uppercase tracking-wider">
                            <th class="pb-3 pl-3">Timestamp</th>
                            <th class="pb-3">Target Model</th>
                            <th class="pb-3">Provider</th>
                            <th class="pb-3">Latency</th>
                            <th class="pb-3">Tokens</th>
                            <th class="pb-3">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody" class="text-sm">
                        <!-- rows inserted via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="text-center text-slate-500 text-sm mt-8 pb-8">
            <p>Claude Code Proxy Router Dashboard &copy; 2026</p>
        </footer>
    </div>

    <script>
        // Chart instances
        let modelChart = null;
        let providerChart = null;

        // Custom chart.js defaults for dark theme
        Chart.defaults.color = '#94a3b8'; // slate-400
        Chart.defaults.font.family = "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif";
        
        const chartColors = [
            'rgba(52, 211, 153, 0.85)', // emerald
            'rgba(56, 189, 248, 0.85)', // light blue
            'rgba(167, 139, 250, 0.85)', // purple
            'rgba(251, 146, 60, 0.85)',  // orange
            'rgba(244, 114, 182, 0.85)'  // pink
        ];

        async function fetchData() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                if (data.error) {
                    console.error("API Error:", data.error);
                    return;
                }

                // Update KPIs
                document.getElementById('kpi-calls').innerText = data.summary.calls.toLocaleString();
                document.getElementById('kpi-tokens').innerText = data.summary.tokens.toLocaleString();
                document.getElementById('kpi-latency').innerText = Math.round(data.summary.latency);

                // Render Models Chart
                const modelCtx = document.getElementById('modelChart').getContext('2d');
                const modelLabels = data.models.map(m => m.model);
                const modelData = data.models.map(m => m.calls);
                
                if(modelChart) modelChart.destroy();
                modelChart = new Chart(modelCtx, {
                    type: 'bar',
                    data: {
                        labels: modelLabels,
                        datasets: [{
                            label: 'Requests',
                            data: modelData,
                            backgroundColor: chartColors[0],
                            borderRadius: 6,
                            borderWidth: 1,
                            borderColor: 'rgba(52, 211, 153, 1)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { cornerRadius: 8, padding: 12 } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } },
                            x: { grid: { display: false }, border: { display: false } }
                        }
                    }
                });

                // Render Providers Chart
                const providerCtx = document.getElementById('providerChart').getContext('2d');
                const providerLabels = data.providers.map(p => p.provider);
                const providerData = data.providers.map(p => p.calls);

                if(providerChart) providerChart.destroy();
                providerChart = new Chart(providerCtx, {
                    type: 'doughnut',
                    data: {
                        labels: providerLabels,
                        datasets: [{
                            data: providerData,
                            backgroundColor: chartColors,
                            borderWidth: 0,
                            hoverOffset: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, pointStyle: 'circle' } },
                            tooltip: { cornerRadius: 8, padding: 12 }
                        },
                        cutout: '75%'
                    }
                });

                // Render Table
                const tbody = document.getElementById('logs-tbody');
                tbody.innerHTML = '';
                data.recent_logs.forEach(log => {
                    const date = new Date(log.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                    
                    const statusColor = (log.status_code >= 200 && log.status_code < 300) 
                        ? 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20' 
                        : 'text-red-400 bg-red-400/10 border-red-400/20';
                        
                    const providerTag = `<span class="px-2.5 py-1 rounded-md text-xs font-semibold bg-slate-700/50 text-slate-300 border border-slate-600/50">${log.provider}</span>`;
                    
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-slate-700/30 hover:bg-slate-800/40 transition-colors";
                    tr.innerHTML = `
                        <td class="py-3.5 pl-3 text-slate-400 font-mono text-xs">${date}</td>
                        <td class="py-3.5 font-medium text-slate-200">${log.target_model}</td>
                        <td class="py-3.5">${providerTag}</td>
                        <td class="py-3.5 text-slate-400 font-mono text-xs">${log.latency_ms} ms</td>
                        <td class="py-3.5 text-slate-400 font-mono text-xs">+${log.tokens}</td>
                        <td class="py-3.5"><span class="px-2.5 py-1 ${statusColor} border rounded-full text-xs font-bold">${log.status_code}</span></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Failed to fetch dashboard data:", err);
            }
        }

        // Run on load
        fetchData();
        // Refresh every 10 seconds
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
