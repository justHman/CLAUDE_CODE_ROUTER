name: Deploy to Fly.io

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Secrets are injected
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Kiểm tra xem Action có nhận được Key không nhé:"
          if [ -n "$NVIDIA_API_KEY" ]; then echo "✅ NVIDIA_API_KEY đã được nạp"; else echo "❌ NVIDIA_API_KEY trống rỗng!"; fi
          if [ -n "$GEMINI_API_KEY" ]; then echo "✅ GEMINI_API_KEY đã được nạp"; else echo "❌ GEMINI_API_KEY trống rỗng!"; fi
          if [ -n "$OPENROUTER_API_KEY" ]; then echo "✅ OPENROUTER_API_KEY đã được nạp"; else echo "❌ OPENROUTER_API_KEY trống rỗng!"; fi
          
      - name: Run Pytest
        continue-on-error: true
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m pytest tests

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test  # Chờ cho đến khi job test hoàn thành xong mới chạy deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
