# fly.toml app configuration file generated for claude-code-router-ofmiua

app = "claude-code-router-ofmiua"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  HOST = "0.0.0.0"
  PORT = "8082"
  LOG_LEVEL = "INFO"
