# fly.toml app configuration file

app = "ai-router"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "router_data"
  destination = "/data"

[env]
  HOST = "0.0.0.0"
  PORT = "8082"
  LOG_LEVEL = "INFO"
  DB_DIR = "/data"
